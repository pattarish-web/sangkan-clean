    <script src="tracking.js"></script>
    <script>
        const PER_PAGE = 12;
        let allPosts = [];
        let filtered = [];
        let currentPage = 1;

        const blogGrid = document.getElementById('blogGrid');
        const pagination = document.getElementById('pagination');
        const blogSearch = document.getElementById('blogSearch');
        const blogCategory = document.getElementById('blogCategory');
        const blogCount = document.getElementById('blogCount');
        const crawlLinks = document.getElementById('crawlLinks');

        function getPageFromUrl() {
            const p = new URLSearchParams(window.location.search).get('page');
            return Math.max(1, parseInt(p, 10) || 1);
        }

        function updateUrl(page) {
            const url = new URL(window.location.href);
            if (page <= 1) url.searchParams.delete('page');
            else url.searchParams.set('page', page);
            history.replaceState({}, '', url);
        }

        fetch('posts.json')
            .then(r => r.json())
            .then(data => {
                allPosts = data.slice().reverse();
                filtered = allPosts;
                currentPage = getPageFromUrl();
                buildCrawlLinks();
                render();
            })
            .catch(() => { blogGrid.innerHTML = '<p style="text-align:center;grid-column:1/-1;">ไม่สามารถโหลดบทความได้</p>'; });

        function buildCrawlLinks() {
            crawlLinks.innerHTML = allPosts.map(p =>
                `<a href="blog/${p.slug || 'post'}.html">${p.title}</a>`
            ).join('');
        }

        function applyFilters() {
            const q = blogSearch.value.trim().toLowerCase();
            const cat = blogCategory.value;
            filtered = allPosts.filter(p => {
                const matchQ = !q || (p.title + p.description + (p.category||'')).toLowerCase().includes(q);
                const matchC = !cat || p.category === cat;
                return matchQ && matchC;
            });
            currentPage = 1;
            render();
        }

        blogSearch.addEventListener('input', applyFilters);
        blogCategory.addEventListener('change', applyFilters);

        function render() {
            const totalPages = Math.max(1, Math.ceil(filtered.length / PER_PAGE));
            if (currentPage > totalPages) currentPage = totalPages;
            updateUrl(currentPage);

            const start = (currentPage - 1) * PER_PAGE;
            const pagePosts = filtered.slice(start, start + PER_PAGE);

            if (!pagePosts.length) {
                blogGrid.innerHTML = '<p style="text-align:center;grid-column:1/-1;">ไม่พบบทความ</p>';
                pagination.innerHTML = '';
                blogCount.textContent = '';
                return;
            }

            blogGrid.innerHTML = pagePosts.map(post => {
                const slug = post.slug || 'post';
                return `<a href="blog/${slug}.html" class="blog-card">
                    <img src="${post.image}" alt="${post.title}" class="blog-card-img" loading="lazy" width="400" height="180">
                    <div class="blog-card-body">
                        <span class="blog-card-tag">${post.category || 'บทความ'}</span>
                        <h2 class="blog-card-title">${post.title}</h2>
                        <p class="blog-card-desc">${post.description}</p>
                        <span style="font-size:0.78rem;color:#94a3b8;"><i class="fa-regular fa-calendar"></i> ${post.date}</span>
                    </div>
                </a>`;
            }).join('');

            blogCount.textContent = `แสดง ${start + 1}-${start + pagePosts.length} จาก ${filtered.length} บทความ`;
            renderPagination(totalPages);
        }

        function renderPagination(totalPages) {
            if (totalPages <= 1) { pagination.innerHTML = ''; return; }
            let html = `<button ${currentPage===1?'disabled':''} onclick="goPage(${currentPage-1})" aria-label="หน้าก่อนหน้า">ก่อนหน้า</button>`;
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 2) {
                    const active = i === currentPage ? 'active' : '';
                    const aria = i === currentPage ? ' aria-current="page"' : '';
                    html += `<button class="${active}" onclick="goPage(${i})"${aria}>${i}</button>`;
                } else if (Math.abs(i - currentPage) === 3) {
                    html += '<span aria-hidden="true">...</span>';
                }
            }
            html += `<button ${currentPage===totalPages?'disabled':''} onclick="goPage(${currentPage+1})" aria-label="หน้าถัดไป">ถัดไป</button>`;
            pagination.innerHTML = html;
        }

        window.goPage = function(p) {
            currentPage = p;
            render();
            if (typeof trackEvent === 'function') trackEvent('blog_pagination', { event_category: 'engagement', page: p });
            window.scrollTo({ top: document.querySelector('.blog-grid-section').offsetTop - 80, behavior: 'smooth' });
        };

        const menuToggle = document.getElementById('menuToggle');
        const navMenu = document.getElementById('navMenu');
        if (menuToggle) menuToggle.addEventListener('click', () => navMenu.classList.toggle('active'));
    </script>
