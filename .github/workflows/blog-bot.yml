name: Daily AI Blog Generator

on:
  schedule:
    # 01:00 UTC ≈ 08:00 น. ไทย
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      posts_per_category:
        description: "Posts per category (เคล็ดลับ/ธุรกิจ/คู่มือ — ไม่รวมบริการ)"
        required: false
        default: "1"

concurrency:
  group: sangkan-site-content
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run AI Blog Generator
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        POSTS_PER_CATEGORY: ${{ github.event.inputs.posts_per_category || '1' }}
        GEMINI_MIN_INTERVAL: "20"
        BLOG_POST_GAP_SEC: "5"
        PYTHONUNBUFFERED: "1"
      run: |
        echo "POSTS_PER_CATEGORY=$POSTS_PER_CATEGORY"
        python generate_blog.py

    - name: Commit and Push changes
      run: |
        set -e
        git config --global user.name "Sangkan Clean Blog Bot"
        git config --global user.email "bot@sangkanclean.com"
        git add posts.json posts-index.json blog/ blog.html index.html sitemap.xml sitemap-pages.xml sitemap-blog.xml robots.txt
        if git diff-index --quiet HEAD; then
          echo "No changes to commit"
          exit 0
        fi

        COUNT=$(python -c "import json; print(len(json.load(open('posts.json',encoding='utf-8'))))")
        git commit -m "chore: daily blogs with covers [skip ci] (posts=$COUNT)"
        OUR=$(git rev-parse HEAD)
        echo "$OUR" > /tmp/our_commit
        git fetch origin

        if git rebase origin/main; then
          echo "Rebase OK"
        else
          echo "Rebase conflict — merge new posts onto origin/main and rebuild"
          git rebase --abort
          git show "$OUR:posts.json" > /tmp/ours_posts.json
          git reset --hard origin/main
          python merge_daily_blog_push.py
          git add posts.json posts-index.json blog/ blog.html index.html sitemap.xml sitemap-pages.xml sitemap-blog.xml robots.txt
          COUNT=$(python -c "import json; print(len(json.load(open('posts.json',encoding='utf-8'))))")
          if git diff-index --quiet HEAD; then
            echo "Nothing to commit after merge rebuild"
          else
            git commit -m "chore: daily blogs with covers [skip ci] (posts=$COUNT)"
          fi
        fi

        for i in 1 2 3; do
          if git push origin HEAD:main; then
            echo "Push OK"
            exit 0
          fi
          echo "Push attempt $i failed — fetch and retry"
          git fetch origin
          if ! git pull --rebase origin main; then
            echo "retry rebase failed"
            git rebase --abort || true
          fi
          sleep 5
        done
        echo "Push failed after retries"
        exit 1
