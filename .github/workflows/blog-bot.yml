name: Daily AI Blog Generator

on:
  schedule:
    # ตั้งเวลารันอัตโนมัติทุกวัน เวลา 01:00 น. UTC (ประมาณ 08:00 น. เวลาไทย)
    - cron: '0 1 * * *'
  workflow_dispatch: # เปิดให้สามารถกดรันมือได้เองทางเว็บ GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run AI Blog Generator
      env:
        # ดึง API Key จาก Secrets ของ Repository
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python generate_blog.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "Sangkan Clean Blog Bot"
        git config --global user.email "bot@sangkanclean.com"
        git add posts.json blog/ sitemap.xml
        # เช็คว่ามีไฟล์เปลี่ยนจริงหรือไม่ก่อนเซฟ เพื่อไม่ให้เออร์เรอร์
        git diff-index --quiet HEAD || git commit -m "chore: auto-generate daily blog post [skip ci]"
        git pull --rebase origin main
        git push
