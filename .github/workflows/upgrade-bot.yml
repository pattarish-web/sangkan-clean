name: Mass Upgrade Old Blogs (GEO)

on:
  schedule:
    # 02:00 UTC ≈ 09:00 น. ไทย — หลัง Daily Blog Bot (01:00 UTC)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      batch_limit:
        description: "Posts per run (0 = all pending; throttle via sleep/key)"
        required: false
        default: "0"
      workers:
        description: "Parallel workers (3 = one per API key in secret)"
        required: false
        default: "3"

env:
  BATCH_LIMIT: ${{ github.event.inputs.batch_limit || '0' }}
  GEO_WORKERS: ${{ github.event.inputs.workers || '3' }}
  GEO_SLEEP_SEC: "120"

jobs:
  upgrade:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install requests

    - name: Show run config
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        echo "============================================================"
        echo " GEO Upgrade — slow drain (offline → Gemini)"
        echo "============================================================"
        echo "  batch_limit : $BATCH_LIMIT (0 = all pending)"
        echo "  workers     : $GEO_WORKERS"
        echo "  sleep/key   : ${GEO_SLEEP_SEC}s (throttle; pause key on 429)"
        echo "  save mode   : per-post (git push after each)"
        echo "  skip rule   : geo_source=gemini already done"
        echo "  retry passes: 2 (15-min cooldown between passes)"
        KEY_COUNT=$(echo "$GEMINI_API_KEY" | tr ',' '\n' | sed '/^$/d' | wc -l)
        echo "  API keys    : $KEY_COUNT detected"
        echo "============================================================"

    - name: Run GEO Upgrader (batch)
      env:
        PYTHONUNBUFFERED: "1"
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEO_BATCH_LIMIT: ${{ env.BATCH_LIMIT }}
        GEO_WORKERS: ${{ env.GEO_WORKERS }}
        GEO_SLEEP_SEC: ${{ env.GEO_SLEEP_SEC }}
        GEO_INCREMENTAL_COMMIT: "1"
        GEMINI_MIN_INTERVAL: ${{ env.GEO_SLEEP_SEC }}
      run: python upgrade_old_posts.py --limit ${{ env.BATCH_LIMIT }} --workers ${{ env.GEO_WORKERS }} --sleep ${{ env.GEO_SLEEP_SEC }}

    - name: Final commit (sitemap & site build)
      run: |
        echo "============================================================"
        echo " FINAL COMMIT — sitemap, areas, remaining artifacts"
        echo "============================================================"
        git config --global user.name "Sangkan Clean Upgrade Bot"
        git config --global user.email "bot@sangkanclean.com"
        git add posts.json posts-index.json blog/ blog.html index.html robots.txt areas/ sitemap.xml analytics.js landing-*.html privacy.html
        echo "--- git status ---"
        git status --short
        echo "--- diff stat ---"
        git diff --cached --stat
        if git diff-index --quiet HEAD; then
          echo "::warning::No changes to commit — upgrade may have failed or nothing pending"
        else
          git commit -m "chore: GEO upgrade drain [skip ci]"
          echo "::notice::Committed GEO upgrade changes"
        fi
        git reset --hard
        git clean -fd
        git pull --rebase origin main
        git push origin HEAD:main
        echo "::notice::Pushed to main successfully"
