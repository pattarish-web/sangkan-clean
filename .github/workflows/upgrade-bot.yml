name: Mass Upgrade Old Blogs (GEO)

on:
  workflow_dispatch:
    inputs:
      batch_limit:
        description: "Posts per run (0 = all pending offline→Gemini)"
        required: false
        default: "20"
      workers:
        description: "Parallel workers (1 safer for free tier, 3 = all keys)"
        required: false
        default: "1"

jobs:
  upgrade:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install requests

    - name: Show run config
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        echo "============================================================"
        echo " GEO Upgrade — slow drain (offline → Gemini)"
        echo "============================================================"
        echo "  batch_limit : ${{ inputs.batch_limit }} (0 = all pending)"
        echo "  workers     : ${{ inputs.workers }}"
        echo "  sleep/key   : 45s (pause key immediately on 429)"
        echo "  save mode   : per-post (git push after each)"
        echo "  skip rule   : geo_source=gemini already done"
        echo "  retry passes: 2 (15-min cooldown between passes)"
        KEY_COUNT=$(echo "$GEMINI_API_KEY" | tr ',' '\n' | sed '/^$/d' | wc -l)
        echo "  API keys    : $KEY_COUNT detected"
        echo "============================================================"

    - name: Run GEO Upgrader (batch)
      env:
        PYTHONUNBUFFERED: "1"
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEO_BATCH_LIMIT: ${{ inputs.batch_limit }}
        GEO_WORKERS: ${{ inputs.workers }}
        GEO_SLEEP_SEC: "45"
        GEO_INCREMENTAL_COMMIT: "1"
        GEMINI_MIN_INTERVAL: "45"
      run: python upgrade_old_posts.py --limit ${{ inputs.batch_limit }} --workers ${{ inputs.workers }} --sleep 45

    - name: Final commit (sitemap & site build)
      run: |
        echo "============================================================"
        echo " FINAL COMMIT — sitemap, areas, remaining artifacts"
        echo "============================================================"
        git config --global user.name "Sangkan Clean Upgrade Bot"
        git config --global user.email "bot@sangkanclean.com"
        git add posts.json blog/ areas/ sitemap.xml analytics.js landing-*.html privacy.html
        echo "--- git status ---"
        git status --short
        echo "--- diff stat ---"
        git diff --cached --stat
        if git diff-index --quiet HEAD; then
          echo "::warning::No changes to commit — upgrade may have failed or nothing pending"
        else
          git commit -m "chore: GEO upgrade batch (${{ inputs.batch_limit }} posts) [skip ci]"
          echo "::notice::Committed GEO upgrade changes"
        fi
        git reset --hard
        git clean -fd
        git pull --rebase origin main
        git push origin HEAD:main
        echo "::notice::Pushed to main successfully"
