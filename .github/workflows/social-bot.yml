name: Daily Social Content Bot

on:
  schedule:
    # 02:00 UTC ≈ 09:00 Bangkok
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (1 = assets only, no publish)"
        required: false
        default: "0"
      channels:
        description: "Comma list: facebook,instagram,tiktok,line"
        required: false
        default: "facebook,instagram,tiktok,line"

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow requests imageio-ffmpeg

      - name: Generate and publish
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          SOCIAL_ASSET_BASE_URL: ${{ secrets.SOCIAL_ASSET_BASE_URL }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_PUBLISH_MODE: draft
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}
          CHANNELS: ${{ github.event.inputs.channels || 'facebook,instagram,tiktok,line' }}
          PYTHONUNBUFFERED: "1"
          GEMINI_MIN_INTERVAL: "20"
        working-directory: marketing/social-bot
        run: python generate_social_post.py

      - name: Commit log and assets
        run: |
          git config --global user.name "Sangkan Clean Social Bot"
          git config --global user.email "bot@sangkanclean.com"
          git add marketing/social-bot/log.json marketing/social-bot/out || true
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily social post [skip ci]"
            git fetch origin
            git pull --rebase origin main || true
            for i in 1 2 3; do
              if git push origin HEAD:main; then
                echo "Push OK"
                exit 0
              fi
              echo "Push attempt $i failed — rebase and retry"
              git pull --rebase origin main || true
              sleep 5
            done
            echo "Push failed after retries"
            exit 1
          fi
